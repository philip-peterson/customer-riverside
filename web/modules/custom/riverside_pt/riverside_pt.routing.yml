riverside_pt.home:
  path: '/home'
  defaults:
    _controller: '\Drupal\riverside_pt\Controller\HomeController::page'
    _title: 'Riverside Physical Therapy'
  requirements:
    _permission: 'access content'

riverside_pt.schedule:
  path: '/schedule'
  defaults:
    _controller: '\Drupal\riverside_pt\Controller\ScheduleController::page'
    _title: 'Schedule'
  requirements:
    _permission: 'access content'

riverside_pt.booking:
  path: '/schedule/book'
  defaults:
    _form: '\Drupal\riverside_pt\Form\BookingForm'
    _title: 'Request Appointment'
  requirements:
    _permission: 'access content'

riverside_pt.booking_store_slot:
  path: '/schedule/book/slot'
  defaults:
    _controller: '\Drupal\riverside_pt\Controller\ScheduleController::storeSlot'
  requirements:
    _permission: 'access content'
  methods: [POST]

riverside_pt.schedule_events:
  path: '/schedule/events'
  defaults:
    _controller: '\Drupal\riverside_pt\Controller\ScheduleController::events'
  requirements:
    _permission: 'access content'
  options:
    _auth:
      - cookie
